<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ston paper scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="container">
            <h1>STON PAPER SCESSER</h1>
            <div class="game-options">
                <div class="box" id="Stone">
                    <img src="./images/stone.png">
                </div>
                <div class="box" id="paper">
                    <img src="./images/paper.png">
                </div>
                <div class="box" id="scissors">
                    <img src="./images/scissors.png">
                </div>
            </div>
            <div class="Score">
                <div class="user">
                    <p id="myScore">0</p>
                    <p>You</p>
                </div>
                <div class="comp">
                    <p id="compScore">0</p>
                    <p>Computer</p>
                </div>
            </div>
            <div class="result">
                <p id="result-text">Play Game</p>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
